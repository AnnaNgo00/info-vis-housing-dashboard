<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Housing Supply Dashboard</title>

  <script src="https://cdn.jsdelivr.net/npm/vega@5"></script>
  <script src="https://cdn.jsdelivr.net/npm/vega-lite@5"></script>
  <script src="https://cdn.jsdelivr.net/npm/vega-embed@6"></script>

  <style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: white;
    color: black;
  }

  .container {
    max-width: 1100px;
    margin: auto;
    padding: 40px;
    text-align: center;
  }

  h1 {
    font-size: 40px;
    margin: 0 0 10px 0;
  }

  .subtitle {
    font-size: 18px;
    margin: 0 0 40px 0;
  }

  /* Center Vega charts */
  #vis {
    margin: 20px auto 0 auto;
    display: flex;
    justify-content: center;
  }
</style>
</head>

<body>
  <div class="container">
    <h1>Is Housing Supply Keeping Up with Price & Rent Growth?</h1>
      <div class="subtitle">
        Regional analysis: Dublin vs Rest of Ireland
      </div>

    <div id="vis"></div>
  </div>

  <script>
    vegaEmbed("#vis", "dashboard.json", { actions: false })
      .catch(console.error);
  </script>
</body>
</html>
